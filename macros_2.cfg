#========================================================
#   Dehydrator Macros
#   From: https://github.com/pavluchenkor/iDryer-Unit/blob/main/readme_en.md
#========================================================
[gcode_macro OFF_Dehydrator]
gcode:
    UPDATE_DELAYED_GCODE ID=_UPDATE_Dehydrator DURATION=0
    SET_HEATER_TEMPERATURE HEATER=Dehydrator_Heater TARGET=0
    _status_ready

[delayed_gcode _OFF_Dehydrator]
gcode:
    OFF_Dehydrator
    _status_ready

[gcode_macro _PLA_Dehydrator]
variable_unit_temp: 55
variable_unit_duration: 4
gcode:
    DRY_Dehydrator UNIT_TEMPERATURE={unit_temp} HUMIDITY=10 TIME={unit_duration}
    _status_busy

[gcode_macro _PETG_Dehydrator]
variable_unit_temp: 65
variable_unit_duration: 4
gcode:
    DRY_Dehydrator UNIT_TEMPERATURE={unit_temp} HUMIDITY=10 TIME={unit_duration}
    _status_busy

